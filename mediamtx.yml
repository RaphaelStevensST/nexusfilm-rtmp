logLevel: info
logDestinations: [stdout]

# Railway injeta a PORT automaticamente via env — usar porta 8888 para HLS HTTP
hlsAddress: :8888
hlsEncryption: no
hlsVariant: lowLatency
hlsSegmentCount: 3
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsAllowOrigin: "*"

# RTMP na porta 1935
rtmpAddress: :1935
rtmpEncryption: no

# Desligar o que não usa
rtsp: no
webrtc: no
srt: no
api: no

paths:
  all_others:
